name: Publish Website to CPanel
on:
  push:
    branches:
      - main
jobs:
  FTP-Deploy-Action:
    name: FTP-Deploy-Action
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2.1.0
      with:
        fetch-depth: 2
    - name: FTP-Deploy-Action
      uses: SamKirkland/FTP-Deploy-Action@3.1.1
      with:
        tp-server: $ff secrets.ETP_SERVER 3}
        tp-username: ${{ secrets.FTP_USERNAME }}
        ftp-password: ${< secrets.FTP_PASSWORD 7}
